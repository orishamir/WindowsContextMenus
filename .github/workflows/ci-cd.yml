name: CI/CD Pipeline

on: push

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test
        uses: ./.github/actions/test

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build
        uses: ./.github/actions/build-package

  for-testing:
    name: Temp
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "setup docker"
        uses: docker/setup-docker-action@v4

      - run: docker build -t tmp:latest .

      - run: docker save tmp:latest | gzip > tmp.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          path: tmp.tar.gz
          name: "docker built.tar.gz"
