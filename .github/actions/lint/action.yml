name: "Lint"
description: "Lint code"
inputs:
  python-version:
    description: "Python version"
    required: true
    default: "3.13"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install lint dependencies
      run: uv sync --group lint
      shell: sh

    - run: flake8
      shell: sh
